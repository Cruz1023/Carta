<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una carta para ti ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#sobre{
    width:260px;
    height:180px;
    background:#fff;
    position:relative;
    cursor:pointer;
    border-radius:10px;
    box-shadow:0 15px 30px rgba(0,0,0,.25);
    transition:.6s;
}

#sobre:before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    border-left:130px solid transparent;
    border-right:130px solid transparent;
    border-top:90px solid #ff6b81;
    transform-origin:top;
    transition:.8s;
}

#textoSobre{
    position:absolute;
    width:100%;
    text-align:center;
    top:115px;
    font-size:22px;
    color:#ff4d6d;
    font-weight:bold;
}

#carta{
    position:absolute;
    width:90%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

#carta h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

#carta p{
    font-size:18px;
    line-height:1.7;
}

#carta.visible{
    opacity:1;
    transform:translateY(0);
}

.oculto{
    display:none;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    background:#ff4d6d;
    color:white;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<div id="sobre">
    <div id="textoSobre">💌 Ábreme</div>
</div>

<div id="carta" class="oculto">
    <h1>Para Ti ❤️</h1>

    <p>
        Aquí puedes escribir todo lo que quieras.<br><br>

        Gracias por aparecer en mi vida.<br>
        Eres una persona muy especial para mí y quería
        recordártelo de una forma diferente.<br><br>

        Te quiero muchísimo. ❤️
    </p>

    <button onclick="lluvia()">❤️</button>
</div>

<script>

const sobre=document.getElementById("sobre");
const carta=document.getElementById("carta");

sobre.onclick=function(){

    sobre.style.transform="scale(0)";
    sobre.querySelector(":before");

    setTimeout(()=>{
        sobre.classList.add("oculto");
        carta.classList.remove("oculto");

        setTimeout(()=>{
            carta.classList.add("visible");
        },100);

    },500);

}

function lluvia(){

    for(let i=0;i<40;i++){

        let corazon=document.createElement("div");

        corazon.innerHTML="❤️";

        corazon.style.position="fixed";
        corazon.style.left=Math.random()*100+"vw";
        corazon.style.top="-20px";
        corazon.style.fontSize=(20+Math.random()*20)+"px";
        corazon.style.transition="4s linear";

        document.body.appendChild(corazon);

        setTimeout(()=>{
            corazon.style.top="110vh";
        },50);

        setTimeout(()=>{
            corazon.remove();
        },4000);
    }

}
</script>

</body>
</html>
